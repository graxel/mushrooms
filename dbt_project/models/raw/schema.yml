version: 2

models:
  - name: mushrooms_raw
    description: "Mushroom data staging table: raw mushroom data with unique row IDs"
    columns:
      - name: mushroom_id
        description: "Unique monotonically increasing surrogate key (1-N)"
        tests:
          - unique
          - not_null
      - name: label
        description: "Edible (e/p) target label"
        tests:
          - not_null
