name: Deploy to Server
on:
  push:
    branches: ['main', 'test', 'cloud']
jobs:

  provision:
    if: github.ref_name == 'cloud'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      server_ip: ${{ steps.terraform.outputs.server_ip }}
      pg_host: ${{ steps.terraform.outputs.pg_host }}
      pg_user: ${{ steps.terraform.outputs.pg_user }}
      pg_pass: ${{ steps.terraform.outputs.pg_pass }}
      pg_db: ${{ steps.terraform.outputs.pg_db }}
    steps:
    - uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init/Plan/Apply
      id: terraform
      env:
        AWS_REGION: us-east-1
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: |
        terraform init
        terraform plan -var="branch=${{ github.ref_name }}"
        terraform apply -auto-approve -var="branch=${{ github.ref_name }}"
        echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT
        echo "pg_host=$(terraform output -raw pg_host)" >> $GITHUB_OUTPUT
        echo "pg_user=$(terraform output -raw pg_user)" >> $GITHUB_OUTPUT
        echo "pg_pass=$(terraform output -raw pg_pass)" >> $GITHUB_OUTPUT
        echo "pg_db=$(terraform output -raw pg_db)" >> $GITHUB_OUTPUT
  

  deploy:
    runs-on: ubuntu-latest
    environment: >-
      ${{ github.ref_name == 'main' && 'prod' ||
          github.ref_name == 'test' && 'qa' ||
          github.ref_name == 'cloud' && 'cloud' ||
          'default' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Deploy to ${{ github.ref_name }}
      uses: appleboy/ssh-action@v1.0.3
      env:
        GIT_REPO: ${{ github.repository }}
        REPO_NAME: ${{ github.event.repository.name }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        PG_HOST: ${{ secrets.PG_HOST }}
        PG_PASS: ${{ secrets.PG_PASS }}
        PG_PORT: ${{ secrets.PG_PORT }}
        PG_USER: ${{ secrets.PG_USER }}
        DBT_TARGET: ${{ secrets.DBT_TARGET }}
        PG_DB: ${{ secrets.PG_DB }}
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        MLFLOW_S3_ENDPOINT_URL: ${{ secrets.MLFLOW_S3_ENDPOINT_URL }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}
      with:
        host: ${{ secrets.SERVER_IP_ADDR }}
        port: ${{ secrets.SERVER_SSH_PORT }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: GIT_REPO,REPO_NAME,GITHUB_REF_NAME,PG_HOST,PG_PASS,PG_PORT,PG_USER,DBT_TARGET,PG_DB,MLFLOW_TRACKING_URI,MLFLOW_S3_ENDPOINT_URL,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,PREFECT_API_URL
        script: |
          cd ~/"$REPO_NAME" || \
          git clone "https://github.com/$GIT_REPO" ~/"$REPO_NAME" && \
          cd ~/"$REPO_NAME" && \
          git checkout "$GITHUB_REF_NAME" && \
          git pull origin "$GITHUB_REF_NAME" && \
          bash setup_scripts/deploy_script.sh
